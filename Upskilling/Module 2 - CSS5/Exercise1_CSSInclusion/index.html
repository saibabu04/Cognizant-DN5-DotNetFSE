<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1 - CSS Inclusion</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Internal CSS -->
    <style>
        h2{
            color:green;
        }
    </style>
</head>
<body>

    <h1 style="color:red;">Community Event Portal</h1>

    <h2>Welcome to CSS3 Exercise 1</h2>

    <p>
        This paragraph is styled using an external CSS file.
    </p>

</body>
</html>
