<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8 - Box Model</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <h1>Community Event Portal</h1>
</header>

<div class="eventCard">
    <h2>Community Sports Meet</h2>

    <p>
        Join us for an exciting sports event with football,
        cricket, volleyball, and athletics competitions.
    </p>
</div>

<br>

<input type="text"
        placeholder="Enter Your Name"
        class="inputBox">

<br><br>

<div class="hiddenBox">
    This box uses <strong>visibility: hidden</strong>
</div>

<div class="noneBox">
    This box uses <strong>display: none</strong>
</div>

</body>
</html>
