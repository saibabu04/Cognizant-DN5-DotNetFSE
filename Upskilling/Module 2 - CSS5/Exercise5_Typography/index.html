<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Exercise 5 - Typography</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <h1>Community Event Portal</h1>
    </header>

    <section class="content">

        <h2>Annual Cultural Festival</h2>

        <p class="description">
            Welcome to the Annual Cultural Festival where residents gather to celebrate music,
            dance, food, and cultural diversity. Join us for exciting performances and fun
            activities for the entire family.

        <p class="quote">
            "Together we build a stronger community."
        </p>

    </section>

</body>
