<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exercise 8 - Effects</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

body{
    font-family:Arial;
    margin:30px;
}

#box{
    width:300px;
    height:150px;
    background:steelblue;
    color:white;
    text-align:center;
    line-height:150px;
    font-size:22px;
    margin-top:20px;
}

button{
    margin:5px;
    padding:10px 15px;
}

</style>

</head>

<body>

<h1>Community Event Portal</h1>

<div id="box">
Community Event
</div>

<br>

<button id="hideBtn">Hide</button>

<button id="showBtn">Show</button>

<button id="toggleBtn">Toggle</button>

<button id="fadeInBtn">Fade In</button>

<button id="fadeOutBtn">Fade Out</button>

<button id="fadeToggleBtn">Fade Toggle</button>

<button id="slideUpBtn">Slide Up</button>

<button id="slideDownBtn">Slide Down</button>

<button id="slideToggleBtn">Slide Toggle</button>

<script>

$(document).ready(function(){

    $("#hideBtn").click(function(){

        $("#box").hide(1000);

    });

    $("#showBtn").click(function(){

        $("#box").show(1000);

    });

    $("#toggleBtn").click(function(){

        $("#box").toggle(1000);

    });

    $("#fadeInBtn").click(function(){

        $("#box").fadeIn(1000);

    });

    $("#fadeOutBtn").click(function(){

        $("#box").fadeOut(1000);

    });

    $("#fadeToggleBtn").click(function(){

        $("#box").fadeToggle(1000);

    });

    $("#slideUpBtn").click(function(){

        $("#box").slideUp(1000);

    });

    $("#slideDownBtn").click(function(){

        $("#box").slideDown(1000);

    });

    $("#slideToggleBtn").click(function(){

        $("#box").slideToggle(1000);

    });

});

</script>

</body>

</html>
