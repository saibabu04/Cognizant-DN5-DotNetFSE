<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registration Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container mt-5">

<h2 class="text-center text-primary">
Registration Form
</h2>

<form>

<div class="row">

<div class="col-md-6">

<label>First Name</label>

<input
type="text"
class="form-control">

</div>

<div class="col-md-6">

<label>Last Name</label>

<input
type="text"
class="form-control">

</div>

</div>

<br>

<div class="mb-3">

<label>Email</label>

<input
type="email"
class="form-control">

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
class="form-control">

</div>

<div class="mb-3">

<label>Gender</label>

<select class="form-select">

<option>Male</option>
<option>Female</option>
<option>Other</option>

</select>

</div>

<button class="btn btn-primary">
Register
</button>

</form>

</div>

</body>
</html>
