<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Container Types</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<h2 class="text-center mt-4 text-success">
Bootstrap Container Types
</h2>

<div class="container bg-primary text-white p-4 mt-4">

<h4>.container</h4>

<p>
Fixed width responsive container.
</p>

</div>

<div class="container-fluid bg-warning p-4 mt-4">

<h4>.container-fluid</h4>

<p>
Always occupies 100% width.
</p>

</div>

<div class="container-lg bg-info text-white p-4 mt-4">

<h4>.container-lg</h4>

<p>
Responsive large container.
</p>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
