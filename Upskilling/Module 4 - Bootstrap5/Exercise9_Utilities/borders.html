<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Borders</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="text-center">
Bootstrap Borders
</h2>

<div class="border p-4 mb-3">
Default Border
</div>

<div class="border border-primary p-4 mb-3">
Primary Border
</div>

<div class="border border-success border-3 p-4 mb-3">
Success Border
</div>

<div class="rounded border p-4">
Rounded Border
</div>

</div>

</body>

</html>
