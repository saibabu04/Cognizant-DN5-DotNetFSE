<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bootstrap Cards</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container mt-5">

<h1 class="text-center text-primary mb-4">
Bootstrap Cards
</h1>

<div class="row">

<div class="col-md-4">

<div class="card shadow">

<img src="https://picsum.photos/300/200"
class="card-img-top"
alt="Image">

<div class="card-body">

<h5 class="card-title">
Nature
</h5>

<p class="card-text">
Bootstrap cards make it easy to display content.
</p>

<a href="#" class="btn btn-primary">
Read More
</a>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card shadow">

<img src="https://picsum.photos/301/200"
class="card-img-top"
alt="Image">

<div class="card-body">

<h5 class="card-title">
Technology
</h5>

<p class="card-text">
Cards can include images, buttons and text.
</p>

<a href="#" class="btn btn-success">
Explore
</a>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card shadow">

<img src="https://picsum.photos/302/200"
class="card-img-top"
alt="Image">

<div class="card-body">

<h5 class="card-title">
Travel
</h5>

<p class="card-text">
Responsive Bootstrap card example.
</p>

<a href="#" class="btn btn-danger">
Visit
</a>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
