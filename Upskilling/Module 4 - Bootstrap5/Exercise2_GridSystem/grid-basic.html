<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bootstrap Grid Examples</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container mt-5">

<h2 class="text-center text-success mb-4">
Bootstrap Grid Examples
</h2>


<h4>12 Equal Columns</h4>

<div class="row">

<div class="col border p-3 bg-light">1</div>
<div class="col border p-3 bg-light">2</div>
<div class="col border p-3 bg-light">3</div>
<div class="col border p-3 bg-light">4</div>
<div class="col border p-3 bg-light">5</div>
<div class="col border p-3 bg-light">6</div>
<div class="col border p-3 bg-light">7</div>
<div class="col border p-3 bg-light">8</div>
<div class="col border p-3 bg-light">9</div>
<div class="col border p-3 bg-light">10</div>
<div class="col border p-3 bg-light">11</div>
<div class="col border p-3 bg-light">12</div>

</div>

<br>


<h4>Different Width Columns</h4>

<div class="row">

<div class="col-3 bg-primary text-white p-4">
25%
</div>

<div class="col-6 bg-warning p-4">
50%
</div>

<div class="col-3 bg-success text-white p-4">
25%
</div>

</div>

<br>


<h4>Responsive Grid</h4>

<div class="row">

<div class="col-sm-12 col-md-6 col-lg-3 bg-danger text-white p-4">
Box 1
</div>

<div class="col-sm-12 col-md-6 col-lg-3 bg-info p-4">
Box 2
</div>

<div class="col-sm-12 col-md-6 col-lg-3 bg-secondary text-white p-4">
Box 3
</div>

<div class="col-sm-12 col-md-6 col-lg-3 bg-dark text-white p-4">
Box 4
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
